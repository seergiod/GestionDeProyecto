<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Proyecto</title>

    <style>
        body {
            font-family: Arial;
            background: #1e1e2f;
            color: white;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: #2a2a3d;
            padding: 20px;
            border-radius: 10px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
        }

        button:hover {
            background: #3730a3;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Crear Proyecto</h2>

    <form th:action="@{/proyectos/guardar}" th:object="${proyecto}" method="post">

        <input type="text" th:field="*{nombre}" placeholder="Nombre">

        <textarea th:field="*{descripcion}" placeholder="Descripción"></textarea>

        <select th:field="*{estado}">
            <option value="pendiente">Pendiente</option>
            <option value="en_progreso">En progreso</option>
            <option value="finalizado">Finalizado</option>
        </select>

        <button type="submit">Guardar</button>

    </form>

</div>

</body>
</html>
